name: 50 DAST Scan Docker Image

on:
  workflow_dispatch:
    inputs:
      image-tag:
        type: string
        description: 'Docker image to scan'
        required: true

  workflow_call:
    inputs:
      image-tag:
        type: string
        required: true

env:
  REGISTRY: ghcr.io
  IMAGE_TAG: ${{ inputs.image-tag || github.event.inputs.image-tag }}

jobs:
  dast-scan:
    name: DAST Scan
    runs-on: ubuntu-latest

    steps:
      # ✅ Login to registry
      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ✅ Run container
      - name: Run container
        run: |
          docker rm -f demoApp || true
          docker run -d -p 8080:8080 --name demoApp ${{ env.IMAGE_TAG }}

      # ✅ Debug logs
      - name: Show container logs
        run: docker logs demoApp

      # ✅ Wait for app (FIXED)
      - name: Wait for container to be ready
        run: |
          for i in {1..40}; do
            if curl -s http://localhost:8080 > /dev/null; then
              echo "App is up!"
              break
            fi
            echo "Waiting for app..."
            sleep 5
          done

      # ✅ Test app
      - name: Test endpoint
        run: curl -v http://localhost:8080 || true

      # ✅ IMPORTANT FIX: Use host.docker.internal
      - name: Run ZAP OWASP full scan
        uses: zaproxy/action-full-scan@v0.10.0
        with:
          target: 'http://host.docker.internal:8080'
          cmd_options: '-a -J report.json -w report.md -r report.html'

      # ✅ Upload reports
      - name: Upload ZAP Report
        uses: actions/upload-artifact@v4
        with:
          name: DAST_Report
          path: |
            report.html
            report.json
            report.md

      # ✅ Cleanup
      - name: Stop container
        if: always()
        run: |
          docker stop demoApp || true
          docker rm demoApp || true
