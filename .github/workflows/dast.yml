name: 50 DAST Scan Docker Image

on:
  workflow_dispatch:
    inputs:
      image-tag:
        type: string
        required: true

  workflow_call:
    inputs:
      image-tag:
        type: string
        required: true

env:
  REGISTRY: ghcr.io
  IMAGE_TAG: ${{ inputs.image-tag || github.event.inputs.image-tag }}

jobs:
  dast-scan:
    runs-on: ubuntu-latest

    steps:
      # ✅ Login
      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ✅ Run app container (host network)
      - name: Run container
        run: |
          docker rm -f demoApp || true
          docker run -d --network host --name demoApp ${{ env.IMAGE_TAG }}

      # ✅ Debug logs
      - name: Show container logs
        run: docker logs demoApp

      # ✅ Wait for app
      - name: Wait for app
        run: |
          for i in {1..40}; do
            if curl -s http://localhost:8080 > /dev/null; then
              echo "App is up!"
              break
            fi
            echo "Waiting..."
            sleep 5
          done

      # ✅ Test
      - name: Test endpoint
        run: curl -v http://localhost:8080 || true

      # ✅ FIX: Run ZAP in SAME network
      - name: Run ZAP Scan
        run: |
          docker run --rm \
            --network host \
            -v $(pwd):/zap/wrk \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-full-scan.py \
            -t http://localhost:8080 \
            -r report.html \
            -J report.json || true

      # ✅ Upload report
      - name: Upload ZAP Report
        uses: actions/upload-artifact@v4
        with:
          name: DAST_Report
          path: |
            report.html
            report.json

      # ✅ Cleanup
      - name: Cleanup
        if: always()
        run: |
          docker stop demoApp || true
          docker rm demoApp || true
