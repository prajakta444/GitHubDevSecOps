name: 50 DAST Scan Docker Image

on:
  workflow_dispatch:
    inputs:
      image-tag:
        type: string
        required: true

  workflow_call:
    inputs:
      image-tag:
        type: string
        required: true

env:
  REGISTRY: ghcr.io
  IMAGE_TAG: ${{ inputs.image-tag || github.event.inputs.image-tag }}

jobs:
  dast-scan:
    name: DAST Scan
    runs-on: ubuntu-latest

    steps:
      - name: Log in to the Container registry
        uses: docker/login-action@v3   # ✅ upgraded
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ✅ Start container safely
      - name: Run container
        run: |
          docker rm -f demoApp || true
          docker run -d -p 8080:8080 --name demoApp ${{ env.IMAGE_TAG }}

      # ✅ Debug logs (VERY IMPORTANT)
      - name: Check container logs
        run: docker logs demoApp

      # ✅ FIXED wait logic (no strict 200)
      - name: Wait for container to start
        run: |
          for i in {1..30}; do
            if curl -s http://localhost:8080 > /dev/null; then
              echo "App is up!"
              break
            fi
            echo "Waiting for app..."
            sleep 5
          done

      # ✅ Test endpoint (optional)
      - name: Test container
        run: curl -v http://localhost:8080 || true

      # ✅ Updated ZAP version
      - name: Run ZAP OWASP full scan
        uses: zaproxy/action-full-scan@v0.10.0
        with:
          target: 'http://localhost:8080'
          cmd_options: '-a -J report.json -w report.md -r report.html'

      # ✅ Upload correct report
      - name: Upload html report
        uses: actions/upload-artifact@v4
        with:
          name: DAST_Report
          path: |
            report.html
            report.json
            report.md

      - name: Stop docker
        if: always()
        run: |
          docker stop demoApp || true
          docker rm demoApp || true
