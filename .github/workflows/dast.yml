name: 50 DAST Scan Docker Image

on:
  workflow_dispatch:
    inputs:
      image-tag:
        type: string
        required: true

  workflow_call:
    inputs:
      image-tag:
        type: string
        required: true

env:
  REGISTRY: ghcr.io
  IMAGE_TAG: ${{ inputs.image-tag || github.event.inputs.image-tag }}

jobs:
  dast-scan:
    runs-on: ubuntu-latest

    steps:
      # ✅ Login to GHCR
      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ✅ Run container
      - name: Run container
        run: |
          docker rm -f demoApp || true
          docker run -d --network host --name demoApp ${{ env.IMAGE_TAG }}

      # ✅ Verify container is running
      - name: Check running container
        run: docker ps

      # ✅ Show logs (important for debugging)
      - name: Show container logs
        run: docker logs demoApp

      # ✅ FIXED: Wait for app (FAIL if not up)
      - name: Wait for app
        run: |
          for i in {1..40}; do
            if curl -s http://localhost:8080 > /dev/null; then
              echo "App is up!"
              exit 0
            fi
            echo "Waiting..."
            sleep 5
          done
          echo "App did NOT start"
          docker logs demoApp
          exit 1

      # ✅ Test endpoint
      - name: Test endpoint
        run: curl -v http://localhost:8080

      # ✅ Run ZAP scan
      - name: Run ZAP Scan
        run: |
          docker run --rm \
            --network host \
            -v $(pwd):/zap/wrk \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-full-scan.py \
            -t http://localhost:8080 \
            -r report.html \
            -J report.json || true

      # ✅ Debug files (to confirm reports exist)
      - name: Check generated reports
        run: |
          echo "Listing files..."
          ls -la

      # ✅ Upload reports (FIXED YAML)
      - name: Upload ZAP Report
        uses: actions/upload-artifact@v4
        with:
          name: DAST_Report
          path: |
            report.html
            report.json

      # ✅ Cleanup
      - name: Cleanup
        if: always()
        run: |
          docker stop demoApp || true
          docker rm demoApp || true
