name: 40 SAST

on:
  workflow_dispatch:
  workflow_call:

jobs:
  SAST-CodeQL:
    name: Build and SAST CodeQL
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [ 'java' ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}

      - name: Set up JDK 11
        uses: actions/setup-java@v4   # ✅ upgraded
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package -B -Dmaven.test.skip                

      - name: Cache build
        id: cache-build
        uses: actions/cache@v4        # ✅ upgraded
        with:
          path: target
          key: ${{ runner.os }}-target

      - name: Cache m2
        id: cache-deps
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2

      - name: Upload artifact
        uses: actions/upload-artifact@v4   # ✅ FIXED (was v2 ❌)
        with:
          name: target
          path: ${{ github.workspace }}/target

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3   # ✅ upgraded
        with:
          category: "/language:${{matrix.language}}"

  spotbugs:
    name: SAST SpotBugs
    needs: [SAST-CodeQL]
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4   # ✅ upgraded

    - name: Run SpotBugs action
      uses: jmservera/spotbugs-github-action@v0.1.0-alpha
      with:
        packages: com.example.-
        target: ./target
        dependenciesPath: ~/.m2
        basePath: src/main/java

    - name: Upload SpotBugs report
      uses: actions/upload-artifact@v4   # ✅ FIXED
      with:
        name: spotbugs.sarif
        path: ${{ github.workspace }}/results.sarif

    - name: Upload analysis results to GitHub Security tab
      if: always()
      uses: github/codeql-action/upload-sarif@v3   # ✅ upgraded
      with:
        sarif_file: ${{ github.workspace }}/results.sarif    

  semgrep:
    needs: [SAST-CodeQL]
    name: SAST Semgrep
    runs-on: ubuntu-latest

    permissions:
      actions: read
      contents: read
      security-events: write

    container:
      image: returntocorp/semgrep

    if: (github.actor != 'dependabot[bot]')

    steps:
      - uses: actions/checkout@v4

      - run: semgrep ci -v -o results.sarif --sarif || true
        env:
          SEMGREP_RULES: p/default p/security-audit p/r2c-security-audit p/cwe-top-25 p/owasp-top-ten

      - name: Upload Semgrep Report
        uses: actions/upload-artifact@v4   # ✅ cleaned version
        if: always()
        with:
          name: semgrep.sarif
          path: ${{ github.workspace }}/results.sarif

      - name: Upload analysis results to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3   # ✅ upgraded
        with:
          sarif_file: ${{ github.workspace }}/results.sarif
